services:
  upwork-agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: upwork-agent
    restart: unless-stopped
    shm_size: '2gb'
    env_file: ../.env
    volumes:
      - upwork-data:/app/data
      - claude-auth:/root/.claude
    ports:
      - "127.0.0.1:6080:6080"
    environment:
      - DISPLAY=:99
      - CHROME_PATH=/usr/bin/google-chrome-stable

volumes:
  upwork-data:
  claude-auth:
